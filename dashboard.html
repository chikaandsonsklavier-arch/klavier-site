<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLAVIER 管理ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-input: #111111;
    --border: #2a2a2a;
    --border-focus: #8b2635;
    --text: #e8e8e0;
    --text-muted: #6e6e66;
    --accent: #8b2635;
    --accent-light: #c4556a;
    --gold: #b8973a;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Noto Sans JP', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--gold); }

  /* header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(15,15,15,.92);
    backdrop-filter: blur(8px); z-index: 20;
  }
  .header-logo {
    font-family: var(--font-display);
    font-size: 1.5rem; letter-spacing: .18em; font-weight: 600;
  }
  .header-logo span { color: var(--gold); }
  .conn-pill {
    font-size: .72rem; letter-spacing: .05em;
    display: flex; align-items: center; gap: 7px; color: var(--text-muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: background .3s; }
  .dot.ok { background: #4caf7d; }
  .dot.bad { background: var(--accent-light); }

  .wrap { max-width: 940px; margin: 0 auto; padding: 34px 22px 90px; }

  /* nav */
  .nav { display: flex; gap: 4px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
  .nav button {
    background: none; border: none; color: var(--text-muted);
    font-family: var(--font-body); font-size: .84rem; letter-spacing: .04em;
    padding: 12px 18px; cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color .2s, border-color .2s;
  }
  .nav button:hover { color: var(--text); }
  .nav button.active { color: var(--text); border-bottom-color: var(--accent); }

  .view { display: none; }
  .view.active { display: block; }

  .section-title {
    font-family: var(--font-display); font-size: 1.9rem; font-weight: 600;
    letter-spacing: .02em; margin-bottom: 6px;
  }
  .section-desc { color: var(--text-muted); font-size: .84rem; margin-bottom: 26px; }

  /* forms */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { display: block; font-size: .76rem; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 7px; }
  .req { color: var(--accent-light); }
  .form-input, .form-select, textarea.form-input {
    width: 100%; background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 2px; color: var(--text); font-family: var(--font-body);
    font-size: .9rem; font-weight: 300; padding: 11px 13px; transition: border-color .2s;
  }
  .form-input:focus, .form-select:focus, textarea.form-input:focus { outline: none; border-color: var(--border-focus); }
  textarea.form-input { resize: vertical; min-height: 82px; }
  .form-select { appearance: none; cursor: pointer; }
  .hint { font-size: .72rem; color: var(--text-muted); margin-top: 6px; }

  /* buttons */
  .btn {
    font-family: var(--font-body); font-size: .84rem; letter-spacing: .04em;
    padding: 11px 22px; border-radius: 2px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text); cursor: pointer; transition: all .2s;
  }
  .btn:hover { border-color: var(--gold); color: var(--gold); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #a12e40; border-color: #a12e40; color: #fff; }
  .btn-ghost { background: none; }
  .btn-sm { padding: 7px 14px; font-size: .76rem; }
  .btn-danger { color: var(--accent-light); }
  .btn-danger:hover { border-color: var(--accent-light); color: #fff; background: var(--accent); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* image upload */
  .drop {
    border: 1px dashed var(--border); border-radius: 2px; padding: 18px;
    text-align: center; color: var(--text-muted); font-size: .82rem; cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .drop:hover { border-color: var(--gold); color: var(--gold); }
  .thumb-wrap { margin-top: 12px; display: none; }
  .thumb-wrap.show { display: block; }
  .thumb { max-width: 220px; max-height: 150px; border: 1px solid var(--border); border-radius: 2px; display: block; }
  .thumb-meta { font-size: .72rem; color: var(--text-muted); margin-top: 6px; word-break: break-all; }

  /* event list */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
  .ev-card {
    display: grid; grid-template-columns: 66px 1fr auto; gap: 16px; align-items: center;
    padding: 14px 16px; border: 1px solid var(--border); border-radius: 2px; margin-bottom: 10px;
    background: var(--bg-card);
  }
  .ev-thumb {
    width: 66px; height: 66px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border);
    background: var(--bg-input);
  }
  .ev-thumb.empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: .62rem; text-align: center;
  }
  .ev-month { font-size: .7rem; letter-spacing: .08em; color: var(--gold); margin-bottom: 3px; }
  .ev-title { font-size: .95rem; margin-bottom: 2px; }
  .ev-sub { font-size: .78rem; color: var(--text-muted); }
  .ev-actions { display: flex; flex-direction: column; gap: 6px; }

  /* editor card */
  .editor { border: 1px solid var(--border); border-radius: 2px; padding: 22px; margin-bottom: 26px; background: var(--bg-card); display: none; }
  .editor.show { display: block; }
  .editor-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .editor-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
  .editor-badge { font-size: .7rem; letter-spacing: .06em; color: var(--gold); }

  .empty-state { text-align: center; padding: 46px 20px; color: var(--text-muted); font-size: .85rem; border: 1px dashed var(--border); border-radius: 2px; }

  /* log / toast */
  .log-box { margin-top: 18px; font-family: ui-monospace, monospace; font-size: .76rem; }
  .log-line { padding: 3px 0; }
  .log-info { color: var(--text-muted); }
  .log-success { color: #4caf7d; }
  .log-error { color: var(--accent-light); }
  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--gold);
    padding: 13px 22px; border-radius: 2px; font-size: .84rem; opacity: 0; pointer-events: none;
    transition: all .3s; z-index: 50; max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-left-color: var(--accent-light); }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 7px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .ev-card { grid-template-columns: 52px 1fr; }
    .ev-actions { flex-direction: row; grid-column: 1 / -1; }
    .ev-thumb { width: 52px; height: 52px; }
  }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">KLAVIER<span>.</span></div>
  <div class="conn-pill"><span class="dot" id="conn-dot"></span><span id="conn-label">未接続</span></div>
</header>

<div class="wrap">
  <nav class="nav">
    <button class="active" data-view="events" onclick="showView(this,'events')">イベント管理</button>
    <button data-view="settings" onclick="showView(this,'settings')">接続設定</button>
  </nav>

  <!-- ============ EVENTS ============ -->
  <section class="view active" id="view-events">
    <h1 class="section-title">イベント管理</h1>
    <p class="section-desc">追加・編集・削除すると <code>js/events.js</code> が丸ごと更新され、ホームのスライドショーとイベントページに自動反映されます（反映まで1〜2分）。</p>

    <!-- editor (hidden until add/edit) -->
    <div class="editor" id="editor">
      <div class="editor-head">
        <span class="editor-title" id="editor-title">新規イベント</span>
        <span class="editor-badge" id="editor-badge"></span>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">月 <span class="req">*</span></label>
          <select class="form-select" id="ev-month">
            <option value="">選択</option>
            <option>1</option><option>2</option><option>3</option><option>4</option>
            <option>5</option><option>6</option><option>7</option><option>8</option>
            <option>9</option><option>10</option><option>11</option><option>12</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">日付 <span class="req">*</span></label>
          <input type="text" class="form-input" id="ev-date" placeholder="例: 7月5日（土）">
        </div>
        <div class="form-group full">
          <label class="form-label">タイトル</label>
          <input type="text" class="form-input" id="ev-title" placeholder="例: Summer Jazz Night">
        </div>
        <div class="form-group full">
          <label class="form-label">アーティスト <span class="req">*</span></label>
          <input type="text" class="form-input" id="ev-artist" placeholder="例: 豊田チカ Trio">
        </div>
        <div class="form-group">
          <label class="form-label">時間</label>
          <input type="text" class="form-input" id="ev-time" placeholder="OPEN 19:00 / START 19:30">
        </div>
        <div class="form-group">
          <label class="form-label">料金</label>
          <input type="text" class="form-input" id="ev-charge" placeholder="¥3,000（1ドリンク付）">
        </div>
        <div class="form-group full">
          <label class="form-label">紹介文</label>
          <textarea class="form-input" id="ev-desc" placeholder="短い紹介文（任意）"></textarea>
        </div>
        <div class="form-group full">
          <label class="form-label">フライヤー画像</label>
          <div class="drop" id="drop" onclick="document.getElementById('ev-file').click()">
            クリックして画像を選択（JPG / PNG / WebP）
          </div>
          <input type="file" id="ev-file" accept="image/*" style="display:none" onchange="onPickImage(event)">
          <div class="thumb-wrap" id="thumb-wrap">
            <img class="thumb" id="thumb" alt="プレビュー">
            <div class="thumb-meta" id="thumb-meta"></div>
            <button class="btn btn-ghost btn-sm btn-danger" style="margin-top:8px" onclick="clearImage()">画像を外す</button>
          </div>
          <p class="hint">既存の画像を変えない場合は、そのままで大丈夫です。</p>
        </div>
      </div>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn btn-primary" id="btn-save" onclick="saveEvent()">保存して公開する</button>
        <button class="btn btn-ghost" onclick="closeEditor()">キャンセル</button>
      </div>
      <div class="log-box" id="log-save"></div>
    </div>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="openEditor()">＋ 新規イベント</button>
      <button class="btn btn-ghost btn-sm" onclick="loadEvents()">一覧を再読み込み</button>
    </div>

    <div id="event-list"><div class="empty-state">「接続設定」でGitHubに接続すると、イベント一覧が表示されます。</div></div>
  </section>

  <!-- ============ SETTINGS ============ -->
  <section class="view" id="view-settings">
    <h1 class="section-title">接続設定</h1>
    <p class="section-desc">GitHubへ保存するための設定です。入力内容はこの端末のブラウザにのみ保存されます。</p>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">ユーザー / 組織名</label>
        <input type="text" class="form-input" id="gh-user" value="chikaandsonsklavier-arch">
      </div>
      <div class="form-group">
        <label class="form-label">リポジトリ名</label>
        <input type="text" class="form-input" id="gh-repo" value="klavier-site">
      </div>
      <div class="form-group full">
        <label class="form-label">Personal Access Token</label>
        <input type="password" class="form-input" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off">
        <p class="hint">Contents の read/write 権限が必要です。90日で失効したら再発行してください。</p>
      </div>
      <div class="form-group">
        <label class="form-label">ブランチ名</label>
        <input type="text" class="form-input" id="gh-branch" value="main">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveConfig()">保存する</button>
      <button class="btn" onclick="testConnection()">接続をテストする</button>
    </div>
    <div class="log-box" id="log-settings"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 設定 (localStorage)
// ============================================================
const CFG_KEYS = ['gh-user','gh-repo','gh-token','gh-branch'];
const EVENTS_PATH = 'js/events.js';
const IMAGES_DIR  = 'images';

function getConfig() {
  return {
    user:   document.getElementById('gh-user').value.trim()   || localStorage.getItem('gh-user')   || '',
    repo:   document.getElementById('gh-repo').value.trim()   || localStorage.getItem('gh-repo')   || '',
    token:  document.getElementById('gh-token').value.trim()  || localStorage.getItem('gh-token')  || '',
    branch: document.getElementById('gh-branch').value.trim() || localStorage.getItem('gh-branch') || 'main',
  };
}
function saveConfig() {
  CFG_KEYS.forEach(id => localStorage.setItem(id, document.getElementById(id).value.trim()));
  showToast('設定を保存しました');
  updateConnPill(null);
}
function restoreConfig() {
  CFG_KEYS.forEach(id => {
    const saved = localStorage.getItem(id);
    if (saved) document.getElementById(id).value = saved;
  });
}

// ============================================================
// GitHub API helpers
// ============================================================
async function ghGet(path) {
  const { user, repo, token, branch } = getConfig();
  const url = `https://api.github.com/repos/${user}/${repo}/contents/${path}?ref=${branch}`;
  const res = await fetch(url, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' } });
  if (res.status === 404) return null; // ファイルがまだ無い
  if (!res.ok) throw new Error(`取得失敗 (${res.status}) ${path}`);
  const data = await res.json();
  return data; // { content, sha, ... }
}

// テキストファイル取得（デコード済み本文 + sha を返す）
async function getTextFile(path) {
  const data = await ghGet(path);
  if (!data) return { content: null, sha: null };
  const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
  return { content, sha: data.sha };
}

// テキストファイルを書き込み
async function putTextFile(path, content, message, sha) {
  const b64 = btoa(unescape(encodeURIComponent(content)));
  return putRaw(path, b64, message, sha);
}

// 画像などバイナリを書き込み（base64をそのまま渡す）
async function putRaw(path, base64Content, message, sha) {
  const { user, repo, token, branch } = getConfig();
  const url = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const body = { message, content: base64Content, branch };
  if (sha) body.sha = sha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    let msg = res.status;
    try { const e = await res.json(); if (e.message) msg += ` ${e.message}`; } catch(_) {}
    throw new Error(`保存失敗 (${msg})`);
  }
  return res.json();
}

async function testConnection() {
  const { user, repo, token } = getConfig();
  const logId = 'log-settings';
  clearLog(logId);
  if (!user || !repo || !token) { log(logId, '✗ ユーザー・リポジトリ・トークンを入力してください', 'error'); return; }
  log(logId, '接続を確認中...', 'info');
  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}`, { headers: { 'Authorization': `token ${token}` } });
    if (!res.ok) throw new Error(res.status === 404 ? 'リポジトリが見つかりません' : `HTTP ${res.status}`);
    log(logId, `✓ 接続成功：${user}/${repo}`, 'success');
    updateConnPill(true);
  } catch (e) {
    log(logId, `✗ ${e.message}`, 'error');
    updateConnPill(false);
  }
}

// ============================================================
// events.js のパース & 再生成
// ============================================================
// KLAVIER_EVENTS 配列を安全に切り出す（文字列内の [ ] を無視するブラケット対応）
function extractArrayLiteral(jsText) {
  const anchor = jsText.indexOf('KLAVIER_EVENTS');
  if (anchor === -1) throw new Error('KLAVIER_EVENTS が見つかりません');
  const start = jsText.indexOf('[', anchor);
  if (start === -1) throw new Error('配列の開始 [ が見つかりません');
  let depth = 0, inStr = false, quote = '', esc = false, end = -1;
  for (let i = start; i < jsText.length; i++) {
    const c = jsText[i];
    if (inStr) {
      if (esc) { esc = false; }
      else if (c === '\\') { esc = true; }
      else if (c === quote) { inStr = false; }
      continue;
    }
    if (c === '"' || c === "'" || c === '`') { inStr = true; quote = c; continue; }
    if (c === '[') depth++;
    else if (c === ']') { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end === -1) throw new Error('配列の終端 ] が見つかりません');
  return jsText.slice(start, end + 1);
}

function parseEvents(jsText) {
  const literal = extractArrayLiteral(jsText);
  // コメントを含む本物のJS配列リテラルなので new Function で評価
  const arr = (new Function('return (' + literal + ')'))();
  if (!Array.isArray(arr)) throw new Error('配列として解釈できませんでした');
  return arr;
}

function esc(s) { return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/"/g, '\\"'); }

// 全角数字を半角に変換（"８月１４日" → "8月14日"）
function toHalfWidthDigits(s) {
  return String(s == null ? '' : s).replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
}
// 日付文字列から「日」の数値を取り出す（並べ替え用）。"月"の後ろの数字を優先。
function dayNumber(dateStr) {
  const s = toHalfWidthDigits(dateStr);
  const m = s.match(/月\s*(\d+)/) || s.match(/(\d+)\s*日/) || s.match(/(\d+)/);
  return m ? parseInt(m[1], 10) : 999;
}
// イベント配列を「月 → 日」の数値順に並べ替える（文字列比較しない）
function sortEvents(events) {
  return [...events].sort((a, b) =>
    (Number(a.month) || 0) - (Number(b.month) || 0) || dayNumber(a.date) - dayNumber(b.date));
}

// 配列 → events.js の完全なテキストを生成
function serializeEvents(events) {
  const sorted = sortEvents(events);
  const items = sorted.map(e =>
`  {
    month: ${Number(e.month) || 0},
    date: "${esc(e.date)}",
    title: "${esc(e.title)}",
    artist: "${esc(e.artist)}",
    time: "${esc(e.time)}",
    charge: "${esc(e.charge)}",
    description: "${esc(e.description)}",
    image: "${esc(e.image)}",
  },`).join('\n');

  return `// ============================================================
// events.js — ライブイベントデータ管理ファイル
// このファイルは管理ダッシュボードから自動生成されます。
// 手で編集しても構いませんが、下記の形式（各キー）を崩さないでください。
//   month:1〜12 / date:"7月5日（土）" / title / artist / time / charge /
//   description / image:"images/ファイル名.jpg"（画像なしは ""）
// ホームのスライドショーとイベントページが、このデータを共有して読み込みます。
// ============================================================

const KLAVIER_EVENTS = [
${items}
];

// ============================================================
// 【重要】以下のヘルパー関数は main.js から呼び出されます。
//         これが無いとイベントページとスライドショーが表示されません。
//         ダッシュボードが保存のたびに自動で書き出します（削除しないでください）。
// ============================================================

// 指定した月のイベントだけを返す
function getEventsByMonth(month) {
  return KLAVIER_EVENTS.filter(event => event.month === month);
}

// 日本時間（UTC+9）で「今月」のイベントを返す
function getCurrentMonthEvents() {
  const nowJST = new Date(Date.now() + 9 * 60 * 60 * 1000);
  const currentMonth = nowJST.getUTCMonth() + 1;
  return getEventsByMonth(currentMonth);
}

// 日本時間の「今月」の月番号を返す（1〜12）
function getCurrentMonthNumber() {
  const nowJST = new Date(Date.now() + 9 * 60 * 60 * 1000);
  return nowJST.getUTCMonth() + 1;
}
`;
}

// ============================================================
// 一覧の読み込み・表示
// ============================================================
let EVENTS = [];       // 現在の全イベント（メモリ上）
let EVENTS_SHA = null;  // events.js の現在のsha
let editingIndex = -1;  // 編集中のイベントのindex（-1 = 新規）
let pendingImage = null; // { name, base64 } 新規アップロード予定の画像

async function loadEvents() {
  const container = document.getElementById('event-list');
  const { user, repo, token } = getConfig();
  if (!user || !repo || !token) {
    container.innerHTML = '<div class="empty-state">「接続設定」でGitHubに接続してください。</div>';
    return;
  }
  container.innerHTML = '<div class="empty-state">読み込み中...</div>';
  try {
    const { content, sha } = await getTextFile(EVENTS_PATH);
    if (content == null) throw new Error(`${EVENTS_PATH} が見つかりません`);
    EVENTS = parseEvents(content);
    EVENTS_SHA = sha;
    updateConnPill(true);
    renderList();
  } catch (e) {
    container.innerHTML = `<div class="empty-state" style="color:var(--accent-light)">✗ ${e.message}</div>`;
    updateConnPill(false);
  }
}

function renderList() {
  const container = document.getElementById('event-list');
  if (!EVENTS.length) {
    container.innerHTML = '<div class="empty-state">まだイベントがありません。「＋ 新規イベント」から追加してください。</div>';
    return;
  }
  const sorted = EVENTS
    .map((e, i) => ({ e, i }))
    .sort((a, b) => (Number(a.e.month)||0) - (Number(b.e.month)||0) || dayNumber(a.e.date) - dayNumber(b.e.date));

  const { user, repo, branch } = getConfig();
  container.innerHTML = sorted.map(({ e, i }) => {
    const imgUrl = e.image ? `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${e.image}` : '';
    const thumb = e.image
      ? `<img class="ev-thumb" src="${imgUrl}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ev-thumb empty',textContent:'画像リンク切れ'}))">`
      : `<div class="ev-thumb empty">画像なし</div>`;
    return `
      <div class="ev-card">
        ${thumb}
        <div>
          <div class="ev-month">${e.month}月 — ${escapeHtml(e.date)}</div>
          <div class="ev-title">${escapeHtml(e.title || '(タイトルなし)')}</div>
          <div class="ev-sub">${escapeHtml(e.artist || '')}</div>
        </div>
        <div class="ev-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEditor(${i})">編集</button>
          <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteEvent(${i})">削除</button>
        </div>
      </div>`;
  }).join('');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ============================================================
// エディタ（追加・編集共通）
// ============================================================
function openEditor(index = -1) {
  if (!EVENTS_SHA && EVENTS.length === 0) {
    // まだ読み込んでいない場合は先に読み込む
    if (!localStorage.getItem('gh-token') && !getConfig().token) {
      showToast('先に接続設定を行ってください', 'error'); showView(document.querySelector('[data-view=settings]'),'settings'); return;
    }
  }
  editingIndex = index;
  pendingImage = null;
  clearLog('log-save');
  const editor = document.getElementById('editor');
  const isEdit = index >= 0;
  document.getElementById('editor-title').textContent = isEdit ? 'イベントを編集' : '新規イベント';
  document.getElementById('editor-badge').textContent = isEdit ? `${EVENTS[index].month}月 ${EVENTS[index].date}` : '';

  const e = isEdit ? EVENTS[index] : { month:'', date:'', title:'', artist:'', time:'', charge:'', description:'', image:'' };
  document.getElementById('ev-month').value  = e.month || '';
  document.getElementById('ev-date').value   = e.date || '';
  document.getElementById('ev-title').value  = e.title || '';
  document.getElementById('ev-artist').value = e.artist || '';
  document.getElementById('ev-time').value   = e.time || '';
  document.getElementById('ev-charge').value = e.charge || '';
  document.getElementById('ev-desc').value   = e.description || '';

  // 画像プレビュー
  const { user, repo, branch } = getConfig();
  if (e.image) {
    showThumb(`https://raw.githubusercontent.com/${user}/${repo}/${branch}/${e.image}`, e.image);
  } else {
    clearImage();
  }

  editor.classList.add('show');
  editor.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeEditor() {
  document.getElementById('editor').classList.remove('show');
  editingIndex = -1; pendingImage = null;
}

function showThumb(src, meta) {
  document.getElementById('thumb').src = src;
  document.getElementById('thumb-meta').textContent = meta || '';
  document.getElementById('thumb-wrap').classList.add('show');
}
function clearImage() {
  pendingImage = 'REMOVE'; // 明示的に「画像なし」にする合図
  document.getElementById('thumb-wrap').classList.remove('show');
  document.getElementById('ev-file').value = '';
  // 編集中で元々画像があった場合のみ REMOVE、新規なら null 扱い
  if (editingIndex < 0 || !EVENTS[editingIndex] || !EVENTS[editingIndex].image) pendingImage = null;
}

function onPickImage(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('画像ファイルを選択してください', 'error'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result.split(',')[1];
    const cleanName = sanitizeFilename(file.name);
    // 衝突回避のため短いタイムスタンプを前置
    const finalName = `${Date.now().toString(36)}-${cleanName}`;
    pendingImage = { name: finalName, base64, path: `${IMAGES_DIR}/${finalName}` };
    showThumb(reader.result, `${pendingImage.path}（アップロード予定）`);
  };
  reader.readAsDataURL(file);
}

function sanitizeFilename(name) {
  const dot = name.lastIndexOf('.');
  let base = dot > 0 ? name.slice(0, dot) : name;
  let ext  = dot > 0 ? name.slice(dot).toLowerCase() : '';
  base = base.toLowerCase().replace(/[^a-z0-9_-]+/g, '-').replace(/^-+|-+$/g, '') || 'image';
  if (!/\.(jpg|jpeg|png|webp|gif)$/.test(ext)) ext = ext || '.jpg';
  return base + ext;
}

// ============================================================
// 保存（追加 or 編集）
// ============================================================
async function saveEvent() {
  const logId = 'log-save';
  clearLog(logId);
  const ev = {
    month: document.getElementById('ev-month').value,
    date: document.getElementById('ev-date').value.trim(),
    title: document.getElementById('ev-title').value.trim(),
    artist: document.getElementById('ev-artist').value.trim(),
    time: document.getElementById('ev-time').value.trim() || 'OPEN 19:00 / START 19:30',
    charge: document.getElementById('ev-charge').value.trim() || '¥3,000',
    description: document.getElementById('ev-desc').value.trim(),
    image: '',
  };
  if (!ev.month || !ev.date || !ev.artist) {
    log(logId, '✗ 月・日付・アーティストは必須です', 'error');
    showToast('必須項目を入力してください', 'error');
    return;
  }

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>保存中...';

  try {
    // 最新の events.js を取り直して sha を最新化（競合防止）
    log(logId, 'events.js を取得中...', 'info');
    const fresh = await getTextFile(EVENTS_PATH);
    if (fresh.content == null) throw new Error(`${EVENTS_PATH} が見つかりません`);
    EVENTS = parseEvents(fresh.content);
    EVENTS_SHA = fresh.sha;

    // 画像の決定
    const existing = editingIndex >= 0 ? EVENTS[editingIndex] : null;
    if (pendingImage && pendingImage !== 'REMOVE') {
      log(logId, `画像をアップロード中... (${pendingImage.name})`, 'info');
      // 同名があれば sha を取得
      const cur = await ghGet(pendingImage.path);
      await putRaw(pendingImage.path, pendingImage.base64, `画像追加: ${pendingImage.name}`, cur ? cur.sha : null);
      ev.image = pendingImage.path;
      // 画像をコミットしたので events.js の sha を再取得
      const re = await getTextFile(EVENTS_PATH);
      EVENTS = parseEvents(re.content);
      EVENTS_SHA = re.sha;
    } else if (pendingImage === 'REMOVE') {
      ev.image = '';
    } else if (existing) {
      ev.image = existing.image || '';
    }

    // 配列を更新
    if (editingIndex >= 0) EVENTS[editingIndex] = ev;
    else EVENTS.push(ev);

    // events.js を再生成して保存
    log(logId, 'events.js を保存中...', 'info');
    const newText = serializeEvents(EVENTS);
    const msg = editingIndex >= 0 ? `イベント編集: ${ev.date} ${ev.artist}` : `イベント追加: ${ev.date} ${ev.artist}`;
    await putTextFile(EVENTS_PATH, newText, msg, EVENTS_SHA);

    log(logId, `✓ 完了：${ev.date} ${ev.artist}`, 'success');
    log(logId, '⏳ サイト反映まで1〜2分（GitHub Pages）', 'info');
    showToast(editingIndex >= 0 ? 'イベントを更新しました' : 'イベントを追加しました');
    closeEditor();
    await loadEvents();
  } catch (e) {
    log(logId, `✗ ${e.message}`, 'error');
    showToast('エラーが発生しました', 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = '保存して公開する';
  }
}

// ============================================================
// 削除
// ============================================================
async function deleteEvent(index) {
  const target = EVENTS[index];
  if (!target) return;
  if (!confirm(`「${target.month}月 ${target.date} ${target.artist}」を削除します。よろしいですか？`)) return;
  try {
    // クリックした行そのもの（正確な位置）を1件だけ除去。
    // 内容一致で探す方式だと、同一データの重複があったとき別の行を消してしまうため、
    // 一覧を読み込んだ時点の配列インデックスをそのまま使う。
    const removed = EVENTS.splice(index, 1);
    if (removed.length === 0) throw new Error('対象が見つかりませんでした');
    const newText = serializeEvents(EVENTS);
    // 一覧読み込み時に保持している sha で保存（競合時は 409 → 再読み込みを促す）
    await putTextFile(EVENTS_PATH, newText, `イベント削除: ${target.date} ${target.artist}`, EVENTS_SHA);
    showToast('イベントを削除しました');
    await loadEvents(); // 一覧と sha を最新化
  } catch (e) {
    const hint = /409/.test(e.message) ? '（一覧が古い可能性。再読み込みしてやり直してください）' : '';
    showToast(`削除に失敗: ${e.message}${hint}`, 'error');
    await loadEvents(); // 失敗時はローカル配列を破棄して再同期
  }
}

// ============================================================
// UI utilities
// ============================================================
function showView(btn, view) {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
}
function updateConnPill(state) {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.className = 'dot' + (state === true ? ' ok' : state === false ? ' bad' : '');
  label.textContent = state === true ? '接続中' : state === false ? '接続エラー' : '未接続';
}
function log(id, msg, type='info') {
  const box = document.getElementById(id);
  const line = document.createElement('div');
  line.className = `log-line log-${type}`;
  line.textContent = msg;
  box.appendChild(line);
}
function clearLog(id) { document.getElementById(id).innerHTML = ''; }
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// init
// ============================================================
restoreConfig();
if (getConfig().token) { loadEvents(); }
</script>
